<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All In One Production v4.5</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <!-- C-1: API DNS preconnect -->
    <link rel="preconnect" href="https://api.cloudinary.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://api.kie.ai" />
    <link rel="preconnect" href="https://api.evolink.ai" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      /* C-3: font-display: swap for Pretendard */
      @font-face { font-family: 'Pretendard Variable'; font-display: swap; src: local('Pretendard Variable'); }
      @font-face { font-family: Pretendard; font-display: swap; src: local(Pretendard); }

      /* [FIX #503] Custom scrollbar for dark theme — 크기 확대 + 클릭 영역 개선 */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 2px;
        min-height: 40px;
        min-width: 40px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
      ::-webkit-scrollbar-thumb:active {
        background: #9ca3af;
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      body {
        font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      }
    </style>
    <!-- C-2: Google GSI script removed (unused) -->
</head>
  <body class="bg-gray-900 text-white antialiased notranslate" translate="no">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
