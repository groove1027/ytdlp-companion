name = "all-in-one-production"
compatibility_date = "2024-01-01"

# Pages에서는 이 설정이 자동 적용되지만 로컬 개발 시 필요
# 실제 ID는 위에서 생성 시 받은 값으로 교체

[[d1_databases]]
binding = "DB"
database_name = "auth-db"
database_id = "e578c1cf-2e08-4cf9-ae66-8067afa6dc00"

[[kv_namespaces]]
binding = "SESSIONS"
id = "d30b7cd636014eb28167c3948296b32d"

[[kv_namespaces]]
binding = "INVITE_CODES"
id = "245826094c12477c9793de17607d137b"

# Firebase Phone Auth — 본인 인증 필수
# Cloudflare 대시보드 > Pages > Settings > Environment variables 에서 설정하거나
# wrangler secret put FIREBASE_API_KEY 로 설정
[vars]
FIREBASE_API_KEY = ""
# 카카오: "REST_API_KEY:CLIENT_SECRET" 형식 (developers.kakao.com)
KAKAO_CLIENT_SECRET = ""
# 네이버 (developers.naver.com)
NAVER_CLIENT_ID = ""
NAVER_CLIENT_SECRET = ""
