<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Master</title>
  <script src="lib/CSInterface.js"></script>
  <style>
    /* ═══ 기본 ═══ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1e1e1e;
      --bg-card: #2a2a2a;
      --bg-hover: #3a3a3a;
      --bg-active: #0078d4;
      --text: #cccccc;
      --text-dim: #888888;
      --text-bright: #ffffff;
      --border: #444444;
      --success: #4ec9b0;
      --warn: #dcdcaa;
      --error: #f44747;
      --accent: #0078d4;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      padding: 8px;
    }

    /* ═══ 헤더 ═══ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
    }
    .header .version {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ═══ 상태 바 ═══ */
    .status {
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 8px;
      background: var(--bg-card);
    }
    .status.success { color: var(--success); border-left: 3px solid var(--success); }
    .status.error   { color: var(--error);   border-left: 3px solid var(--error); }
    .status.warn    { color: var(--warn);    border-left: 3px solid var(--warn); }
    .status.info    { color: var(--text);    border-left: 3px solid var(--accent); }

    /* ═══ 빠른 적용 버튼 ═══ */
    .action-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      transition: all 0.15s;
    }
    .action-btn:hover { background: var(--bg-hover); }
    .action-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .action-btn.primary:hover { background: #106ebe; }
    .action-btn.danger { border-color: var(--error); color: var(--error); }
    .action-btn.danger:hover { background: rgba(244,71,71,0.15); }
    .action-btn .btn-icon { display: block; font-size: 16px; margin-bottom: 2px; }

    /* ═══ 섹션 ═══ */
    .section {
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .section-toggle {
      cursor: pointer;
      user-select: none;
    }
    .section-toggle::before {
      content: '▸ ';
      display: inline;
    }
    .section-toggle.open::before {
      content: '▾ ';
    }
    .section-body { display: none; }
    .section-body.open { display: block; }

    /* ═══ 프리셋 그리드 ═══ */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .preset-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 2px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 10px;
    }
    .preset-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .preset-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .preset-icon { font-size: 16px; line-height: 1; }
    .preset-label { font-size: 10px; margin-top: 2px; }
    .preset-overscale { font-size: 9px; color: var(--text-dim); margin-top: 1px; }
    .preset-btn.active .preset-overscale { color: rgba(255,255,255,0.7); }

    .motion-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      font-size: 10px;
      transition: all 0.15s;
    }
    .motion-btn:hover { background: var(--bg-hover); }
    .motion-btn.active { background: var(--accent); color: white; }

    /* ═══ 앵커 에디터 ═══ */
    .anchor-editor {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .anchor-grid-line {
      position: absolute;
      background: rgba(255,255,255,0.08);
    }
    .anchor-grid-line.h { width: 100%; height: 1px; }
    .anchor-grid-line.v { width: 1px; height: 100%; }
    #anchor-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid white;
      transform: translate(-50%, -50%);
      cursor: grab;
      z-index: 10;
      box-shadow: 0 0 6px rgba(0,120,212,0.5);
    }

    /* ═══ 슬라이더 ═══ */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .slider-row label {
      width: 60px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    .slider-row .slider-value {
      width: 36px;
      text-align: right;
      font-size: 11px;
      color: var(--text);
    }

    /* ═══ 클립 목록 ═══ */
    .clip-item, .assignment-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
    }
    .clip-idx { color: var(--text-dim); width: 16px; text-align: right; }
    .clip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clip-dur { color: var(--text-dim); }
    .assign-preset { color: var(--accent); font-weight: 500; }
    .assign-anchor { color: var(--text-dim); font-size: 10px; }
    .assign-intensity { color: var(--text-dim); font-size: 10px; }
    .empty { color: var(--text-dim); padding: 12px; text-align: center; font-style: italic; }

    /* ═══ 체크박스 ═══ */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .checkbox-row input { accent-color: var(--accent); }

    /* ═══ 옵션 영역 ═══ */
    .options-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <h1>Motion Master</h1>
    <span class="version">v1.0.0</span>
  </div>

  <!-- 상태 -->
  <div id="status" class="status info">초기화 중...</div>

  <!-- 빠른 적용 -->
  <div class="action-bar">
    <button class="action-btn" id="btn-refresh" title="선택 클립 새로고침">
      <span class="btn-icon">🔄</span>새로고침
    </button>
    <button class="action-btn primary" id="btn-random" title="스마트 랜덤 적용">
      <span class="btn-icon">🎲</span>랜덤
    </button>
    <button class="action-btn" id="btn-smart" title="피사체 감지 + 랜덤">
      <span class="btn-icon">🧠</span>스마트
    </button>
    <button class="action-btn danger" id="btn-remove" title="모션 제거 (되돌리기)">
      <span class="btn-icon">↩️</span>되돌리기
    </button>
  </div>

  <!-- 옵션 -->
  <div class="options-row">
    <label class="checkbox-row">
      <input type="checkbox" onchange="toggleMotionEffects(this.checked)">
      모션 이펙트 랜덤 추가
    </label>
  </div>

  <!-- 선택된 클립 -->
  <div class="section">
    <div class="section-title section-toggle open" onclick="toggleSection(this)">선택된 클립</div>
    <div class="section-body open" id="clip-list">
      <div class="empty">타임라인에서 클립을 선택하세요</div>
    </div>
  </div>

  <!-- 배정 결과 -->
  <div id="assignment-list"></div>

  <!-- 프리셋: 기본 -->
  <div class="section">
    <div class="section-title section-toggle open" onclick="toggleSection(this)">팬 & 줌 — 기본</div>
    <div class="section-body open">
      <div class="preset-grid" id="basic-presets"></div>
    </div>
  </div>

  <!-- 프리셋: 시네마틱 -->
  <div class="section">
    <div class="section-title section-toggle" onclick="toggleSection(this)">팬 & 줌 — 시네마틱</div>
    <div class="section-body">
      <div class="preset-grid" id="cinematic-presets"></div>
    </div>
  </div>

  <!-- 모션 이펙트 -->
  <div class="section">
    <div class="section-title section-toggle" onclick="toggleSection(this)">모션 이펙트</div>
    <div class="section-body">
      <div class="options-row" id="motion-effects"></div>
    </div>
  </div>

  <!-- 세부 조정 -->
  <div class="section">
    <div class="section-title section-toggle" onclick="toggleSection(this)">세부 조정</div>
    <div class="section-body">

      <!-- 앵커 포인트 -->
      <div class="anchor-editor" id="anchor-area">
        <!-- 삼분할 그리드 -->
        <div class="anchor-grid-line h" style="top:33.3%"></div>
        <div class="anchor-grid-line h" style="top:66.6%"></div>
        <div class="anchor-grid-line v" style="left:33.3%"></div>
        <div class="anchor-grid-line v" style="left:66.6%"></div>
        <div id="anchor-dot" style="left:50%;top:50%"></div>
      </div>

      <div class="slider-row">
        <label>앵커 X</label>
        <input type="range" id="anchor-x" min="0" max="100" value="50"
          oninput="onAnchorChange('x', this.value)">
        <span class="slider-value" id="anchor-x-value">50%</span>
      </div>
      <div class="slider-row">
        <label>앵커 Y</label>
        <input type="range" id="anchor-y" min="0" max="100" value="50"
          oninput="onAnchorChange('y', this.value)">
        <span class="slider-value" id="anchor-y-value">50%</span>
      </div>
      <div class="slider-row">
        <label>강도</label>
        <input type="range" id="intensity" min="50" max="150" value="100" step="5"
          oninput="onIntensityChange(this.value / 100)">
        <span class="slider-value" id="intensity-value">100%</span>
      </div>
    </div>
  </div>

  <!-- 선택 클립에 수동 적용 -->
  <div style="margin-top: 8px;">
    <button class="action-btn primary" id="btn-apply" style="width: 100%;">
      선택 클립에 적용
    </button>
  </div>

  <script>
    // 섹션 토글
    window.toggleSection = function(el) {
      el.classList.toggle('open');
      var body = el.nextElementSibling;
      if (body) body.classList.toggle('open');
    };

    // 앵커 드래그
    (function() {
      var area = document.getElementById('anchor-area');
      var dot = document.getElementById('anchor-dot');
      var dragging = false;

      function updateFromMouse(e) {
        var rect = area.getBoundingClientRect();
        var x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        var y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
        window.onAnchorChange('x', Math.round(x));
        window.onAnchorChange('y', Math.round(y));
      }

      dot.addEventListener('mousedown', function(e) { dragging = true; e.preventDefault(); });
      area.addEventListener('click', function(e) { updateFromMouse(e); });
      document.addEventListener('mousemove', function(e) { if (dragging) updateFromMouse(e); });
      document.addEventListener('mouseup', function() { dragging = false; });
    })();
  </script>

  <!-- 앱 로직 -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
