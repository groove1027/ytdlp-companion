<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Master</title>
  <script src="lib/CSInterface.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #232323;
      --surface: #2d2d2d;
      --surface-hover: #383838;
      --surface-press: #404040;
      --text: #d4d4d4;
      --text-sub: #808080;
      --text-bright: #f0f0f0;
      --border: #3c3c3c;
      --accent: #4f9cf7;
      --accent-hover: #6aadff;
      --accent-dim: rgba(79,156,247,0.12);
      --accent-glow: rgba(79,156,247,0.25);
      --success: #73c991;
      --warn: #e8c36a;
      --error: #e95454;
      --radius: 4px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif;
      font-size: 11px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* ═══ 고정 헤더 ═══ */
    .toolbar {
      flex-shrink: 0;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .toolbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .toolbar-top h1 { font-size: 12px; font-weight: 600; color: var(--text-bright); letter-spacing: -0.2px; }
    .toolbar-top .ver { font-size: 9px; color: var(--text-sub); }

    #status {
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 10px;
      margin-bottom: 6px;
      background: var(--surface);
      border-left: 2px solid var(--accent);
      color: var(--text-sub);
    }
    #status.success { border-color: var(--success); color: var(--success); }
    #status.error   { border-color: var(--error);   color: var(--error); }
    #status.warn    { border-color: var(--warn);     color: var(--warn); }

    .action-row {
      display: grid;
      grid-template-columns: auto 1fr 1fr auto;
      gap: 4px;
    }

    /* ═══ 버튼 공통 ═══ */
    button {
      font-family: inherit;
      font-size: 10px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
      transition: background 0.1s, box-shadow 0.1s, transform 0.08s;
      -webkit-user-select: none;
    }
    button:active { transform: scale(0.96); }

    .btn-action {
      padding: 6px 10px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 500;
    }
    .btn-action:hover { background: var(--surface-hover); border-color: #555; }
    .btn-action:active { background: var(--surface-press); }

    .btn-accent {
      padding: 6px 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border: 1px solid transparent;
      box-shadow: 0 1px 4px rgba(79,156,247,0.25);
    }
    .btn-accent:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(79,156,247,0.35); }
    .btn-accent:active { background: #4090e0; }

    .btn-danger {
      padding: 6px 10px;
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border);
    }
    .btn-danger:hover { background: rgba(233,84,84,0.1); color: var(--error); border-color: var(--error); }

    /* ═══ 스크롤 영역 ═══ */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 8px 60px;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    .scroll-area::-webkit-scrollbar-thumb:hover { background: #777; }

    /* ═══ 섹션 ═══ */
    .sec { margin-bottom: 2px; }
    .sec-head {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 6px;
      cursor: pointer;
      user-select: none;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-radius: var(--radius);
      transition: background 0.1s;
    }
    .sec-head:hover { background: var(--surface); }
    .sec-head .arrow {
      display: inline-block;
      width: 10px;
      font-size: 8px;
      transition: transform 0.15s;
      color: var(--text-sub);
    }
    .sec-head.open .arrow { transform: rotate(90deg); }
    .sec-body { display: none; padding: 2px 0 6px; }
    .sec-body.open { display: block; }

    /* ═══ 클립 목록 ═══ */
    .clip-list {
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .clip-list::-webkit-scrollbar { width: 3px; }
    .clip-list::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    .clip-row {
      display: flex;
      align-items: center;
      padding: 3px 6px;
      font-size: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .clip-row:last-child { border-bottom: none; }
    .clip-num { width: 18px; color: var(--text-sub); text-align: right; margin-right: 6px; font-size: 9px; }
    .clip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clip-dur { color: var(--text-sub); font-size: 9px; margin-left: 4px; }
    .clip-empty { padding: 10px; text-align: center; color: var(--text-sub); font-size: 10px; }

    /* ═══ 프리셋 그리드 ═══ */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    .preset-btn {
      position: relative;
      padding: 5px 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      line-height: 1.3;
      transition: all 0.1s;
      overflow: hidden;
    }
    .preset-btn:hover { background: var(--surface-hover); border-color: #555; }
    .preset-btn:active { background: var(--surface-press); transform: scale(0.97); }
    .preset-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .preset-btn .p-label { display: block; font-size: 10px; }
    .preset-btn .p-meta { display: block; font-size: 8px; color: var(--text-sub); margin-top: 1px; }
    .preset-btn.active .p-meta { color: rgba(79,156,247,0.6); }

    /* ═══ 모션 태그 ═══ */
    .tag-row { display: flex; flex-wrap: wrap; gap: 3px; }
    .tag-btn {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-sub);
      font-size: 9px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
    }
    .tag-btn:hover { background: var(--surface-hover); color: var(--text); }
    .tag-btn:active { transform: scale(0.95); }
    .tag-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ═══ 앵커 에디터 ═══ */
    .anchor-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      overflow: hidden;
    }
    .anchor-line {
      position: absolute;
      background: rgba(255,255,255,0.05);
    }
    .anchor-line.h { width: 100%; height: 1px; }
    .anchor-line.v { width: 1px; height: 100%; }
    #anchor-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 1.5px solid #fff;
      transform: translate(-50%, -50%);
      cursor: grab;
      z-index: 10;
      box-shadow: 0 0 8px var(--accent-glow);
      transition: box-shadow 0.15s;
    }
    #anchor-dot:hover { box-shadow: 0 0 14px var(--accent-glow); }

    /* ═══ 슬라이더 ═══ */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .slider-row label { width: 32px; font-size: 10px; color: var(--text-sub); }
    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 1.5px solid #fff;
      box-shadow: 0 0 4px var(--accent-glow);
    }
    .slider-row .sv { width: 30px; text-align: right; font-size: 10px; color: var(--text-sub); }

    /* ═══ 배정 목록 ═══ */
    .assign-item {
      display: flex;
      align-items: center;
      padding: 3px 6px;
      font-size: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .assign-tag {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 500;
      margin-left: auto;
    }

    /* ═══ 하단 고정 ═══ */
    .bottom-bar {
      flex-shrink: 0;
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .bottom-bar button {
      width: 100%;
      padding: 7px;
      font-size: 11px;
    }

    /* ═══ 체크박스 ═══ */
    .chk-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-sub);
      padding: 2px 0;
    }
    .chk-row input { accent-color: var(--accent); width: 12px; height: 12px; }

    /* ═══ 뱃지 ═══ */
    .badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      background: var(--surface);
      color: var(--text-sub);
      margin-left: 4px;
    }
  </style>
</head>
<body>

  <!-- ═══ 고정 헤더 (액션 버튼) ═══ -->
  <div class="toolbar">
    <div class="toolbar-top">
      <h1>Motion Master</h1>
      <span class="ver">v1.1</span>
    </div>
    <div id="status">Premiere 연결 중...</div>
    <div style="height:4px"></div>
    <div class="action-row">
      <button class="btn-action" id="btn-refresh" title="클립 새로고침">Refresh</button>
      <button class="btn-accent" id="btn-random" title="스마트 랜덤 모션">Random</button>
      <button class="btn-accent" id="btn-smart" title="피사체 감지 + 랜덤" style="background:#6c63ff;box-shadow:0 1px 4px rgba(108,99,255,0.25);">Smart</button>
      <button class="btn-danger" id="btn-remove" title="모션 제거">Undo</button>
    </div>
  </div>

  <!-- ═══ 스크롤 영역 ═══ -->
  <div class="scroll-area">

    <!-- 옵션 -->
    <div style="padding:4px 0">
      <label class="chk-row">
        <input type="checkbox" onchange="toggleMotionEffects(this.checked)">
        Motion effect random
      </label>
    </div>

    <!-- 선택된 클립 -->
    <div class="sec">
      <div class="sec-head open" onclick="toggleSection(this)">
        <span class="arrow">&#9654;</span> Clips <span class="badge" id="clip-count">0</span>
      </div>
      <div class="sec-body open">
        <div class="clip-list" id="clip-list">
          <div class="clip-empty">Select clips in timeline</div>
        </div>
      </div>
    </div>

    <!-- 배정 결과 -->
    <div id="assignment-list"></div>

    <!-- 프리셋: 기본 -->
    <div class="sec">
      <div class="sec-head open" onclick="toggleSection(this)">
        <span class="arrow">&#9654;</span> Pan & Zoom
      </div>
      <div class="sec-body open">
        <div class="preset-grid" id="basic-presets"></div>
      </div>
    </div>

    <!-- 프리셋: 시네마틱 -->
    <div class="sec">
      <div class="sec-head" onclick="toggleSection(this)">
        <span class="arrow">&#9654;</span> Cinematic
      </div>
      <div class="sec-body">
        <div class="preset-grid" id="cinematic-presets"></div>
      </div>
    </div>

    <!-- 모션 이펙트 -->
    <div class="sec">
      <div class="sec-head" onclick="toggleSection(this)">
        <span class="arrow">&#9654;</span> Effects
      </div>
      <div class="sec-body">
        <div class="tag-row" id="motion-effects"></div>
      </div>
    </div>

    <!-- 세부 조정 -->
    <div class="sec">
      <div class="sec-head" onclick="toggleSection(this)">
        <span class="arrow">&#9654;</span> Fine Tune
      </div>
      <div class="sec-body">
        <div class="anchor-box" id="anchor-area">
          <div class="anchor-line h" style="top:33.3%"></div>
          <div class="anchor-line h" style="top:66.6%"></div>
          <div class="anchor-line v" style="left:33.3%"></div>
          <div class="anchor-line v" style="left:66.6%"></div>
          <div id="anchor-dot" style="left:50%;top:50%"></div>
        </div>
        <div class="slider-row">
          <label>X</label>
          <input type="range" id="anchor-x" min="0" max="100" value="50" oninput="onAnchorChange('x', this.value)">
          <span class="sv" id="anchor-x-value">50</span>
        </div>
        <div class="slider-row">
          <label>Y</label>
          <input type="range" id="anchor-y" min="0" max="100" value="50" oninput="onAnchorChange('y', this.value)">
          <span class="sv" id="anchor-y-value">50</span>
        </div>
        <div class="slider-row">
          <label>Int.</label>
          <input type="range" id="intensity" min="50" max="150" value="100" step="5" oninput="onIntensityChange(this.value / 100)">
          <span class="sv" id="intensity-value">100%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 하단 고정 (적용 버튼) ═══ -->
  <div class="bottom-bar">
    <button class="btn-accent" id="btn-apply">Apply to Selected</button>
  </div>

  <script>
    window.toggleSection = function(el) {
      el.classList.toggle('open');
      var body = el.nextElementSibling;
      if (body) body.classList.toggle('open');
    };

    (function() {
      var area = document.getElementById('anchor-area');
      var dot = document.getElementById('anchor-dot');
      var dragging = false;
      function updateFromMouse(e) {
        var rect = area.getBoundingClientRect();
        var x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        var y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
        window.onAnchorChange('x', Math.round(x));
        window.onAnchorChange('y', Math.round(y));
      }
      dot.addEventListener('mousedown', function(e) { dragging = true; e.preventDefault(); });
      area.addEventListener('click', function(e) { updateFromMouse(e); });
      document.addEventListener('mousemove', function(e) { if (dragging) updateFromMouse(e); });
      document.addEventListener('mouseup', function() { dragging = false; });
    })();
  </script>

  <!-- ES module import/export가 CEP file:// 로딩에서 MIME/CORS 이슈로 막힐 수 있어
       bundle.sh로 생성한 단일 IIFE 스크립트를 사용한다. -->
  <script src="src/bundle.js"></script>
</body>
</html>
