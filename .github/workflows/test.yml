name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        # npm ci 대신 npm install 사용 — esbuild optionalDependencies의
        # 알려진 npm 버그로 macOS에서 생성한 lock 파일이 Linux 항목을 누락하기 때문
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm run test:run

      - name: Vite build
        run: npm run build
