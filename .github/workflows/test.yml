name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      # [CF Pages parity] CF Pages는 npm ci로 install하므로 lockfile-package.json
      # mismatch 시 빌드를 0초 만에 거부한다. 며칠 동안 prod 배포가 silently
      # 막혔던 사고가 있었다 (5f66f11 → 2ce2875 lockfile sync 참고).
      # 이 step은 CF와 동일한 npm ci를 dry-run으로 돌려 mismatch를 사전에 잡는다.
      # dry-run이라 디스크 install은 안 함 — 그건 아래 install step에서 처리.
      - name: Verify package-lock.json is in sync (Cloudflare Pages parity)
        run: |
          if ! npm ci --dry-run --no-audit --no-fund 2>&1 | tee /tmp/npm-ci-dryrun.log; then
            echo ""
            echo "::error::❌ src/package-lock.json이 src/package.json과 sync되지 않았습니다."
            echo "::error::이 상태로 push하면 Cloudflare Pages가 'npm error Missing: ... from lock file'로 빌드를 거부합니다."
            echo "::error::수정: cd src && npm install --package-lock-only && git add src/package-lock.json && git commit"
            exit 1
          fi
          echo "✅ lockfile sync OK — Cloudflare Pages 빌드도 통과할 예정"

      - name: Install dependencies
        # npm ci 대신 npm install 사용 — esbuild optionalDependencies의
        # 알려진 npm 버그로 macOS에서 생성한 lock 파일이 Linux 항목을 누락하기 때문.
        # 단, 위의 'Verify package-lock.json' step이 sync를 강제하므로 prod 배포는 안전.
        run: npm install --no-audit --no-fund

      - name: Run Vitest
        # 단위 테스트만 검증 — tsc/build 검증은 Cloudflare Pages 빌드가 처리
        run: npm run test:run

      # ──────────────────────────────────────────────────────────────
      # Companion release sync verification
      # 웹앱이 요구하는 MIN_REQUIRED_COMPANION_VERSION이 public 미러
      # (groove1027/ytdlp-companion)에 실제로 게시되어 있는지 확인.
      # 이 검증이 빠지면 MIN을 올린 PR이 prod에 머지되었을 때 모든 사용자가
      # 무한 다운로드 루프에 빠진다 (release: companion v1.3.0 사고 재발 방지).
      # ──────────────────────────────────────────────────────────────
      - name: Verify companion release sync
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/verify-companion-release-sync.mjs
