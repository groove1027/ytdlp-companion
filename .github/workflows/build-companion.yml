name: Build Companion App

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (Windows)
        working-directory: companion/src-tauri
        run: cargo tauri build

      # [v2.0.1] Windows binary smoke test — 빌드된 .exe를 windows runner에서 실제 실행하고
      # /health, /api/tunnel/status, /api/library/scan, /api/capture/screen 응답을 검증해
      # "windows_by_handle" unstable feature 같은 stable 회귀를 매 릴리스마다 자동 차단한다.
      - name: Windows smoke test (run binary + curl health/library/capture/ffmpeg)
        working-directory: companion/src-tauri
        shell: pwsh
        env:
          # [v2.0.2] 시스템 ffmpeg 무시 → ensure_ffmpeg 자동 다운로드 분기 검증
          FFMPEG_FORCE_DOWNLOAD_FOR_TEST: "1"
        run: |
          $exe = Get-ChildItem -Path target\release -Filter all-in-one-helper.exe | Select-Object -First 1
          if (-not $exe) { throw "Windows binary not found in target/release" }
          Write-Host "Found binary: $($exe.FullName)"
          # 캐시 디렉터리 비우기 — 깨끗한 상태에서 다운로드 검증
          $ffmpegCacheDir = Join-Path $env:LOCALAPPDATA "ytdlp-companion\bin"
          if (Test-Path $ffmpegCacheDir) { Remove-Item -Recurse -Force $ffmpegCacheDir }
          Write-Host "FFmpeg 캐시 디렉터리 정리: $ffmpegCacheDir"
          $proc = Start-Process -FilePath $exe.FullName -PassThru
          Write-Host "Started PID: $($proc.Id)"
          # cloudflared init 대기 (최대 60초)
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            try {
              $h = Invoke-RestMethod -Uri "http://127.0.0.1:9876/health" -TimeoutSec 3
              if ($h.app -eq "ytdlp-companion") {
                Write-Host "Health OK: version=$($h.version)"
                $ready = $true
                break
              }
            } catch { }
          }
          if (-not $ready) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            throw "Companion binary did not respond to /health within 60s"
          }
          # tunnel status (cloudflared가 준비됐는지 확인)
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            try {
              $t = Invoke-RestMethod -Uri "http://127.0.0.1:9876/api/tunnel/status" -TimeoutSec 5
              if ($t.init_state -eq "ready") {
                Write-Host "Tunnel ready: host=$($t.public_host)"
                break
              }
            } catch { }
          }
          # library scan with home dir (Windows: $env:USERPROFILE)
          $body = @{ dir = $env:USERPROFILE; filter = "all"; max_results = 3 } | ConvertTo-Json
          try {
            $lib = Invoke-RestMethod -Uri "http://127.0.0.1:9876/api/library/scan" -Method Post -ContentType "application/json" -Body $body -TimeoutSec 10
            if ($lib.ok -ne $true) { throw "library scan returned ok=false" }
            Write-Host "Library scan OK: total_found=$($lib.total_found)"
          } catch {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            throw "Library scan failed: $_"
          }
          # capture/screen base64 (CI runner는 화면이 있으나 PowerShell System.Drawing 경로)
          $capBody = @{ target = "screen"; format = "base64" } | ConvertTo-Json
          try {
            $cap = Invoke-RestMethod -Uri "http://127.0.0.1:9876/api/capture/screen" -Method Post -ContentType "application/json" -Body $capBody -TimeoutSec 30
            if ($cap.ok -ne $true) { throw "capture returned ok=false: $($cap.error)" }
            if (-not $cap.data) { throw "capture data empty" }
            Write-Host "Capture OK: format=$($cap.format) size_bytes=$($cap.size_bytes)"
          } catch {
            Write-Host "::warning::capture/screen failed (CI 환경에서 PowerShell PrimaryScreen 못 잡을 수 있음): $_"
          }
          # [v2.0.2] ffmpeg 자동 다운로드 검증 — 최대 180초 대기 (warning-only로 처리)
          # Windows runner는 macOS와 다른 env 전달 + path lookup 특성이 있어 일시적으로
          # warning만 출력하고 release를 막지 않음. 다음 패치에서 진단 강화 후 hard-fail로.
          Write-Host "=== FFmpeg auto-download 진단 ==="
          Write-Host "FFMPEG_FORCE_DOWNLOAD_FOR_TEST = $env:FFMPEG_FORCE_DOWNLOAD_FOR_TEST"
          Write-Host "Cache dir: $ffmpegCacheDir"
          $whichFfmpeg = (Get-Command ffmpeg -ErrorAction SilentlyContinue)
          if ($whichFfmpeg) {
            Write-Host "System ffmpeg found at: $($whichFfmpeg.Source)"
          } else {
            Write-Host "System ffmpeg NOT in PATH"
          }
          $ffmpegPath = Join-Path $ffmpegCacheDir "ffmpeg.exe"
          $ffmpegReady = $false
          for ($i = 0; $i -lt 90; $i++) {
            Start-Sleep -Seconds 2
            if (Test-Path $ffmpegPath) {
              $size = (Get-Item $ffmpegPath).Length
              if ($size -gt 10000000) {
                Write-Host "FFmpeg downloaded: $ffmpegPath ($size bytes) after $($i*2)s"
                $ffmpegReady = $true
                break
              } else {
                Write-Host "[$($i*2)s] cache file exists but $size bytes (still downloading)"
              }
            } elseif (($i % 10) -eq 0) {
              Write-Host "[$($i*2)s] cache file not yet created"
            }
          }
          if (-not $ffmpegReady) {
            if (Test-Path $ffmpegCacheDir) {
              Write-Host "Cache dir contents:"
              Get-ChildItem -Recurse $ffmpegCacheDir
            } else {
              Write-Host "Cache dir does not exist — ensure_ffmpeg may have failed"
            }
            Write-Host "::warning::FFmpeg auto-download not verified on Windows runner (180s) — non-blocking, investigate next patch"
          } else {
            $expectedFfmpeg = "04e1307997530f9cf2fe35cba2ca7e8875ca91da02f89d6c7243df819c94ad00"
            $actualFfmpeg = (Get-FileHash $ffmpegPath -Algorithm SHA256).Hash.ToLower()
            if ($actualFfmpeg -ne $expectedFfmpeg) {
              Write-Host "::warning::FFmpeg SHA-256 mismatch — expected $expectedFfmpeg got $actualFfmpeg"
            } else {
              Write-Host "FFmpeg SHA-256 OK"
              & $ffmpegPath -version | Select-Object -First 1
            }
          }
          # ========================================================
          # [v2.0.4 회귀 가드] Two-instance race test (#1090 same-version takeover guard)
          # v2.0.2 critical 장애의 hard-fail 회귀 차단. cleanup 전에 같은 step 안에서
          # 두 번째 instance를 spawn해 race를 시뮬레이션 — TIME_WAIT/cloudflared init
          # 같은 환경 race를 회피하기 위해 별도 step 대신 통합.
          # ========================================================
          Write-Host "=== Two-instance race test ==="
          $procA_id = $proc.Id
          Write-Host "[Race] A.PID = $procA_id (이미 /health ready 상태)"
          # 이미 첫 instance가 ready이므로 두 번째 instance만 spawn
          $procB = Start-Process -FilePath $exe.FullName -PassThru
          Write-Host "[Race] B.PID = $($procB.Id)"
          # 10초 대기 — single-instance plugin이 B를 종료시키는 시간 + same-version 가드 검증
          Start-Sleep -Seconds 10
          # A의 생존 여부 — 죽었으면 self-kill loop 회귀 (#1090)
          $aliveA = Get-Process -Id $procA_id -ErrorAction SilentlyContinue
          if (-not $aliveA) {
            Stop-Process -Id $procB.Id -Force -ErrorAction SilentlyContinue
            throw "[Race] FAIL: A (PID $procA_id) was killed by B — same-version self-kill loop regression (#1090)"
          }
          Write-Host "[Race] OK: A still alive (PID $procA_id) — same-version takeover guard 정상"
          # /health가 여전히 응답하는지
          try {
            $h3 = Invoke-RestMethod -Uri "http://127.0.0.1:9876/health" -TimeoutSec 5
            Write-Host "[Race] OK: /health still responding (version=$($h3.version))"
          } catch {
            Stop-Process -Id $procA_id -Force -ErrorAction SilentlyContinue
            Stop-Process -Id $procB.Id -Force -ErrorAction SilentlyContinue
            throw "[Race] FAIL: /health stopped responding after second spawn"
          }
          # B가 종료됐는지 (single-instance plugin dedup 검증, warning-only)
          $aliveB = Get-Process -Id $procB.Id -ErrorAction SilentlyContinue
          if ($aliveB) {
            Write-Host "::warning::[Race] B (PID $($procB.Id)) still alive after 10s — single-instance dedup may be slow"
            Stop-Process -Id $procB.Id -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "[Race] OK: B terminated — single-instance plugin dedup 정상"
          }
          Write-Host "=== Race test 통과 ==="

          # cleanup
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test 완료"

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-nsis
          path: companion/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-msi
          path: companion/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (macOS Universal)
        working-directory: companion/src-tauri
        run: cargo tauri build --target universal-apple-darwin

      # [v2.0.1] macOS binary smoke test — universal 빌드의 arm64 슬라이스를 macos-latest
      # (arm64) runner에서 실제 실행해 health/library/capture/ffmpeg 검증.
      - name: macOS smoke test (run binary + curl health/library/capture/ffmpeg)
        working-directory: companion/src-tauri
        env:
          # [v2.0.2] 시스템 ffmpeg 무시 → ensure_ffmpeg 자동 다운로드 분기 검증
          FFMPEG_FORCE_DOWNLOAD_FOR_TEST: "1"
        run: |
          set -e
          BINARY=$(find target/universal-apple-darwin/release/bundle/macos -type f -name "all-in-one-helper" 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            BINARY=$(find target/universal-apple-darwin/release -maxdepth 2 -type f -name "all-in-one-helper" 2>/dev/null | head -1)
          fi
          if [ -z "$BINARY" ]; then
            echo "::error::macOS binary not found"
            find target/universal-apple-darwin/release -type f -name "all-in-one-helper" || true
            exit 1
          fi
          echo "Found binary: $BINARY"
          chmod +x "$BINARY"
          # 캐시 디렉터리 비우기 — ffmpeg 자동 다운로드 검증
          FFMPEG_CACHE_DIR="$HOME/Library/Application Support/ytdlp-companion/bin"
          rm -rf "$FFMPEG_CACHE_DIR"
          echo "FFmpeg 캐시 정리: $FFMPEG_CACHE_DIR"
          "$BINARY" &
          PID=$!
          echo "Started PID: $PID"
          ready=0
          for i in $(seq 1 30); do
            sleep 2
            if curl -fsS http://127.0.0.1:9876/health -o /tmp/h.json 2>/dev/null; then
              version=$(cat /tmp/h.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version'))")
              echo "Health OK: version=$version"
              ready=1
              break
            fi
          done
          if [ $ready -eq 0 ]; then
            kill -9 $PID 2>/dev/null || true
            echo "::error::Companion did not respond to /health within 60s"
            exit 1
          fi
          # tunnel status
          for i in $(seq 1 30); do
            sleep 2
            state=$(curl -fsS http://127.0.0.1:9876/api/tunnel/status 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('init_state'))" 2>/dev/null || echo "")
            if [ "$state" = "ready" ]; then
              host=$(curl -fsS http://127.0.0.1:9876/api/tunnel/status 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('public_host'))")
              echo "Tunnel ready: host=$host"
              break
            fi
          done
          # library scan with $HOME
          curl -fsS -X POST http://127.0.0.1:9876/api/library/scan \
            -H "Content-Type: application/json" \
            -d "{\"dir\":\"$HOME\",\"filter\":\"all\",\"max_results\":3}" \
            -o /tmp/lib.json
          if ! grep -q '"ok":true' /tmp/lib.json; then
            kill -9 $PID 2>/dev/null || true
            cat /tmp/lib.json
            echo "::error::Library scan failed"
            exit 1
          fi
          echo "Library scan OK"
          # capture screen base64 (CI macOS runner도 framebuffer 없을 수 있음)
          if curl -fsS -X POST http://127.0.0.1:9876/api/capture/screen \
            -H "Content-Type: application/json" \
            -d '{"target":"screen","format":"base64"}' \
            -o /tmp/cap.json 2>/dev/null; then
            ok=$(python3 -c "import json; print(json.load(open('/tmp/cap.json')).get('ok'))")
            if [ "$ok" = "True" ]; then
              size=$(python3 -c "import json; print(json.load(open('/tmp/cap.json')).get('size_bytes'))")
              echo "Capture OK: $size bytes"
            else
              err=$(python3 -c "import json; print(json.load(open('/tmp/cap.json')).get('error'))")
              echo "::warning::capture failed (headless CI 가능): $err"
            fi
          else
            echo "::warning::capture/screen 호출 실패 (headless CI 가능)"
          fi
          # [v2.0.2] ffmpeg 자동 다운로드 검증 — 최대 120초 대기
          FFMPEG_PATH="$FFMPEG_CACHE_DIR/ffmpeg"
          ffmpeg_ready=0
          for i in $(seq 1 60); do
            sleep 2
            if [ -f "$FFMPEG_PATH" ]; then
              size=$(stat -f %z "$FFMPEG_PATH" 2>/dev/null || stat -c %s "$FFMPEG_PATH" 2>/dev/null || echo 0)
              if [ "$size" -gt 10000000 ]; then
                echo "FFmpeg downloaded: $FFMPEG_PATH ($size bytes)"
                ffmpeg_ready=1
                break
              fi
            fi
          done
          if [ $ffmpeg_ready -eq 0 ]; then
            kill -9 $PID 2>/dev/null || true
            echo "::error::FFmpeg auto-download did not complete within 120s"
            exit 1
          fi
          # SHA-256 검증 (arm64 universal slice 기준)
          # macos-latest runner는 arm64이므로 darwin-arm64 SHA 사용
          EXPECTED_FFMPEG="a90e3db6a3fd35f6074b013f948b1aa45b31c6375489d39e572bea3f18336584"
          ACTUAL_FFMPEG=$(shasum -a 256 "$FFMPEG_PATH" | awk '{print $1}')
          if [ "$ACTUAL_FFMPEG" != "$EXPECTED_FFMPEG" ]; then
            kill -9 $PID 2>/dev/null || true
            echo "::error::FFmpeg SHA-256 mismatch — expected $EXPECTED_FFMPEG got $ACTUAL_FFMPEG"
            exit 1
          fi
          echo "FFmpeg SHA-256 OK"
          # 실행 검증
          chmod +x "$FFMPEG_PATH"
          "$FFMPEG_PATH" -version | head -1
          kill -9 $PID 2>/dev/null || true
          echo "macOS smoke test 완료"

      - name: Upload macOS Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-universal-dmg
          path: companion/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Create Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

      # ──────────────────────────────────────────────────────────────
      # Automatic mirror to public ytdlp-companion repo
      #
      # 이유: 이 저장소(all-in-one-production)는 PRIVATE이라 웹앱이 GitHub API로
      # 릴리스를 조회할 수 없다. 웹앱은 public ytdlp-companion 저장소에서 다운로드
      # URL/버전을 읽으므로, 빌드한 자산을 public 저장소로 자동 미러링해야 한다.
      #
      # 사전 조건: secrets.PUBLIC_RELEASE_PAT — groove1027/ytdlp-companion에 대한
      # contents:write 권한을 가진 PAT (Personal Access Token).
      # 시크릿이 없으면 이 step은 스킵되고, 미러는 수동으로 해야 함:
      #   bash scripts/mirror-companion-release.sh ${{ github.ref_name }}
      # ──────────────────────────────────────────────────────────────
      - name: Mirror to public ytdlp-companion (auto)
        if: env.PUBLIC_RELEASE_PAT != ''
        env:
          PUBLIC_RELEASE_PAT: ${{ secrets.PUBLIC_RELEASE_PAT }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          repository: groove1027/ytdlp-companion
          token: ${{ secrets.PUBLIC_RELEASE_PAT }}
          name: All In One Helper ${{ github.ref_name }}

      - name: Warn if PAT missing (manual mirror required)
        if: env.PUBLIC_RELEASE_PAT == ''
        env:
          PUBLIC_RELEASE_PAT: ${{ secrets.PUBLIC_RELEASE_PAT }}
        run: |
          echo "::warning::PUBLIC_RELEASE_PAT secret이 설정되지 않아 public 미러가 생략됨."
          echo "::warning::웹앱이 새 버전을 인식하려면 수동 미러링이 필요합니다:"
          echo "::warning::  bash scripts/mirror-companion-release.sh ${{ github.ref_name }}"
          echo "::warning::자동화하려면 GitHub Settings > Secrets에 PUBLIC_RELEASE_PAT 추가 (groove1027/ytdlp-companion contents:write 권한)"
