name: Build Companion App

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (Windows)
        working-directory: companion/src-tauri
        run: cargo tauri build

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-nsis
          path: companion/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-msi
          path: companion/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (macOS ARM)
        working-directory: companion/src-tauri
        run: cargo tauri build

      - name: Upload macOS ARM DMG
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-arm-dmg
          path: companion/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (macOS Intel)
        working-directory: companion/src-tauri
        run: cargo tauri build

      - name: Upload macOS Intel DMG
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-intel-dmg
          path: companion/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
